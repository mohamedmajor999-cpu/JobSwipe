<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JobSwipe — Swipe Stack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <svg class="svg-sprite" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <symbol id="i-user" viewBox="0 0 24 24"><path d="M12 12.75a5.25 5.25 0 1 0 0-10.5 5.25 5.25 0 0 0 0 10.5ZM3 21a9 9 0 1 1 18 0v.75H3V21Z"/></symbol>
      <symbol id="i-sliders" viewBox="0 0 24 24"><path d="M3 5.25h8.25M15.75 5.25H21M9 5.25a1.5 1.5 0 1 1 3 0 1.5 1.5 0 0 1-3 0Zm-6 6h3.75M11.25 11.25H21m-11.25 0a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0Zm-6.75 6h9.75M15.75 17.25H21m-7.5 0a1.5 1.5 0 1 1 3 0 1.5 1.5 0 0 1-3 0Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></symbol>
      <symbol id="i-info" viewBox="0 0 24 24"><path d="M12 2.25a9.75 9.75 0 1 0 0 19.5 9.75 9.75 0 0 0 0-19.5Zm0 5.25a1.125 1.125 0 1 1 0 2.25 1.125 1.125 0 0 1 0-2.25Zm1.125 9.75h-2.25v-6h2.25v6Z"/></symbol>
      <symbol id="i-walk" viewBox="0 0 24 24"><path d="M13 4.5a1.75 1.75 0 1 1-3.5 0 1.75 1.75 0 0 1 3.5 0Zm-3 3.25 2.2.65 1.3 2.6 2.75 1.15-.7 1.65-3.35-1.4-1.1-2.15-1.05 1.4v2.7L8.2 17.1l-1.4-1.1 1.5-1.95v-2.95l1.7-2.35Zm5.85 10.4 1.95 3.1-1.55.95-1.95-3.1 1.55-.95Z"/></symbol>
      <symbol id="i-calendar" viewBox="0 0 24 24"><path d="M7.5 2.25v2.25M16.5 2.25v2.25M3.75 8.25h16.5M5.25 4.5h13.5a1.5 1.5 0 0 1 1.5 1.5v12a1.5 1.5 0 0 1-1.5 1.5H5.25a1.5 1.5 0 0 1-1.5-1.5V6a1.5 1.5 0 0 1 1.5-1.5Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></symbol>
      <symbol id="i-x" viewBox="0 0 24 24"><path d="m6.75 6.75 10.5 10.5m0-10.5-10.5 10.5" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></symbol>
      <symbol id="i-check" viewBox="0 0 24 24"><path d="m5.25 12.75 4.5 4.5 9-9" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></symbol>
      <symbol id="i-star" viewBox="0 0 24 24"><path d="m12 3.25 2.54 5.15 5.69.83-4.11 4.01.97 5.67L12 16.23l-5.09 2.68.97-5.67-4.11-4.01 5.69-.83L12 3.25Z"/></symbol>
      <symbol id="i-briefcase" viewBox="0 0 24 24"><path d="M8.25 5.25a2.25 2.25 0 0 1 2.25-2.25h3a2.25 2.25 0 0 1 2.25 2.25v1.5h2.25A2.25 2.25 0 0 1 20.25 9v8.25a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 17.25V9A2.25 2.25 0 0 1 6 6.75h2.25v-1.5Zm1.5 0v1.5h4.5v-1.5a.75.75 0 0 0-.75-.75h-3a.75.75 0 0 0-.75.75Z"/></symbol>
      <symbol id="i-chat" viewBox="0 0 24 24"><path d="M4.5 5.25A2.25 2.25 0 0 1 6.75 3h10.5a2.25 2.25 0 0 1 2.25 2.25v7.5A2.25 2.25 0 0 1 17.25 15H9l-4.5 3v-3H6.75A2.25 2.25 0 0 1 4.5 12.75v-7.5Z"/></symbol>
    </svg>

    <main class="phone" aria-label="Écran Swipe Stack">
      <header class="screen-header">
        <button class="circle-btn" aria-label="Profil"><svg><use href="#i-user"/></svg></button>
        <div class="title-wrap">
          <h1>Swipe Stack</h1>
          <p><span class="dot"></span><span data-i18n="liveDispatch">DISPATCH EN DIRECT</span></p>
        </div>
        <button class="circle-btn" id="settings-toggle" aria-label="Paramètres"><svg><use href="#i-sliders"/></svg></button>
      </header>

      <article class="map-card">
        <iframe
          class="map-bg"
          title="Carte de la zone du job"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          src="https://www.google.com/maps?q=Vieux-Port%2C+Marseille&z=13&output=embed"
        ></iframe>
        <div class="map-overlay" aria-hidden="true"></div>

        <div class="badge" data-i18n="urgent">DÉMARRAGE IMMÉDIAT</div>
        <button class="info-btn" aria-label="Info"><svg><use href="#i-info"/></svg></button>

        <div class="job-copy">
          <p class="area" data-i18n="district">Quartier de Marseille</p>
          <h2><span data-i18n="lineCookAt">Cuisinier·e à</span> <span>Vieux-Port</span></h2>
          <p class="rate">22€ <small>/h</small></p>
          <p class="distance" data-i18n="distance">~1,4 km du centre-ville</p>
        </div>

        <div class="meta-row">
          <div class="meta-card">
            <svg class="meta-icon"><use href="#i-walk"/></svg>
            <p class="meta-main">7 min</p>
            <p class="meta-label" data-i18n="walkTime">TEMPS À PIED</p>
          </div>
          <div class="meta-card">
            <svg class="meta-icon"><use href="#i-calendar"/></svg>
            <p class="meta-main" data-i18n="tomorrow">Demain</p>
            <p class="meta-label" data-i18n="starts">DÉBUT</p>
          </div>
        </div>
      </article>

      <div class="action-row">
        <button class="action reject" aria-label="Refuser"><svg><use href="#i-x"/></svg></button>
        <button class="action accept" aria-label="Accepter"><svg><use href="#i-check"/></svg></button>
        <button class="action save" aria-label="Favori"><svg><use href="#i-star"/></svg></button>
      </div>

      <nav class="bottom-nav">
        <a class="active" href="#"><svg><use href="#i-briefcase"/></svg><span data-i18n="jobs">Jobs</span></a>
        <a href="#"><svg><use href="#i-chat"/></svg><span data-i18n="chats">Discussions</span></a>
        <a href="#"><svg><use href="#i-briefcase"/></svg><span data-i18n="shifts">Mes shifts</span></a>
        <a href="#"><svg><use href="#i-user"/></svg><span data-i18n="profile">Profil</span></a>
      </nav>
    </main>

    <aside class="settings-panel" id="settings-panel" aria-hidden="true">
      <h3>Paramètres</h3>
      <label class="setting-row">
        <span>Mode clair</span>
        <input id="theme-toggle" type="checkbox" />
      </label>
      <label class="setting-row">
        <span>English mode</span>
        <input id="lang-toggle" type="checkbox" />
      </label>
      <button id="settings-close" class="settings-close">Fermer</button>
    </aside>

    <script src="script.js"></script>
  </body>
</html>
